name: HabitForge
options:
  bundleIdPrefix: com.sreeharshakelam
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

targets:
  HabitForge:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
      - path: Models
      - path: Stores
      - path: Services
      - path: Views
      - path: Extensions
    resources:
      - path: Assets.xcassets
    entitlements:
      path: HabitForge.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sreeharshakelam.HabitForge
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: B37332G6T2
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: "YES"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_CFBundleDisplayName: FORGE
        INFOPLIST_KEY_CFBundleIconName: AppIcon
        INFOPLIST_KEY_LSRequiresIPhoneOS: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
