name: HabitForge
options:
  bundleIdPrefix: com.sreeharshakelam
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

targets:
  HabitForge:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
      - path: Models
      - path: Stores
      - path: Services
      - path: Views
      - path: Extensions
    resources:
      - path: Assets.xcassets
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: FORGE
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIUserInterfaceStyle: Dark
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    entitlements:
      path: HabitForge.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sreeharshakelam.HabitForge
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: B37332G6T2
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
