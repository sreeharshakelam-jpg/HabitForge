name: HabitForge
options:
  bundleIdPrefix: com.sreeharshakelam
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

targets:
  HabitForge:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
      - path: Models
      - path: Stores
      - path: Services
      - path: Views
      - path: Extensions
      - path: Assets.xcassets
        type: folder
    info:
      path: Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundleDisplayName: FORGE - Habit Tracker
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: $(PRODUCT_BUNDLE_PACKAGE_TYPE)
        CFBundleShortVersionString: "2.0.0"
        CFBundleVersion: "18"
        CFBundleIconName: AppIcon
        LSRequiresIPhoneOS: true
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIRequiredDeviceCapabilities:
          - armv7
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    dependencies:
      - target: HabitForgeWatch
        embed: true

    entitlements:
      path: HabitForge.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sreeharshakelam.virtueforge
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: B37332G6T2
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: "NO"

  # ─── watchOS App ──────────────────────────────────────────────────────────────
  HabitForgeWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: HabitForgeWatch/App
      - path: HabitForgeWatch/Models
      - path: HabitForgeWatch/Views
      - path: HabitForgeWatch/Assets.xcassets
        type: folder
    dependencies:
      - target: ForgeWidgetExtension
        embed: true
    info:
      path: HabitForgeWatch/Info.plist
      properties:
        CFBundleDisplayName: FORGE - Habit Tracker
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: "2.0.0"
        CFBundleVersion: "18"
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.sreeharshakelam.virtueforge
        ITSAppUsesNonExemptEncryption: false
        UISupportedInterfaceOrientations: []
    entitlements:
      path: HabitForgeWatch/HabitForgeWatch.entitlements
      properties: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sreeharshakelam.virtueforge.watchkitapp
        SWIFT_VERSION: "5.9"
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: B37332G6T2
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: "NO"

  # ─── Watch Widget / Complication Extension ────────────────────────────────────
  ForgeWidgetExtension:
    type: app-extension
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: HabitForgeWatch/Complications
    info:
      path: HabitForgeWatch/WidgetExtension-Info.plist
      properties:
        CFBundleDisplayName: ForgeWidget
        CFBundleShortVersionString: "2.0.0"
        CFBundleVersion: "18"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
        ITSAppUsesNonExemptEncryption: false
    entitlements:
      path: HabitForgeWatch/ForgeWidget.entitlements
      properties: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sreeharshakelam.virtueforge.watchkitapp.ForgeWidget
        SWIFT_VERSION: "5.9"
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: B37332G6T2
        GENERATE_INFOPLIST_FILE: "NO"
