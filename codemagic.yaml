workflows:
  ios-appstore:
    name: Virtue Forge App Store Release
    max_build_duration: 60
    environment:
      xcode: latest
      groups:
        - default
      vars:
        APP_STORE_CONNECT_ISSUER_ID: a6826daa-63d6-42be-bb34-2938edbcdb7d
        APP_STORE_CONNECT_KEY_IDENTIFIER: U2G5L4729F
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Sync assets everywhere
        script: |
          find . -path "*/AppIcon.appiconset" ! -path "./.git/*" -type d | while read d; do
            cp Assets.xcassets/AppIcon.appiconset/AppIcon.png "$d/AppIcon.png" 2>/dev/null || true
            cat > "$d/Contents.json" << 'EOF'
          {
            "images" : [
              { "filename" : "AppIcon.png", "idiom" : "universal", "platform" : "ios", "size" : "1024x1024" }
            ],
            "info" : { "author" : "xcode", "version" : 1 }
          }
          EOF
          done
          find . -name "Info.plist" ! -path "./.git/*" | while read f; do
            /usr/libexec/PlistBuddy -c "Delete :CFBundleIconName" "$f" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :CFBundleIconName string AppIcon" "$f"
          done

      - name: Generate Xcode project
        script: |
          xcodegen generate --spec project.yml

      - name: Verify Assets in Xcode project
        script: |
          echo "=== Assets.xcassets references in project ==="
          grep -c "Assets.xcassets" HabitForge.xcodeproj/project.pbxproj || echo "NOT FOUND"
          grep "Assets.xcassets" HabitForge.xcodeproj/project.pbxproj | head -5

      - name: Sync AppIcon to watch assets
        script: |
          WATCH_ICON="HabitForgeWatch/Assets.xcassets/AppIcon.appiconset/AppIcon.png"
          cp Assets.xcassets/AppIcon.appiconset/AppIcon.png "$WATCH_ICON" 2>/dev/null || true
          cat > "HabitForgeWatch/Assets.xcassets/AppIcon.appiconset/Contents.json" << 'ICONEOF'
          {
            "images" : [
              { "filename" : "AppIcon.png", "idiom" : "universal", "platform" : "watchos", "size" : "1024x1024" }
            ],
            "info" : { "author" : "xcode", "version" : 1 }
          }
          ICONEOF

      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files \
            com.sreeharshakelam.virtueforge \
            --type IOS_APP_STORE \
            --create
          app-store-connect fetch-signing-files \
            com.sreeharshakelam.virtueforge.watchkitapp \
            --type IOS_APP_STORE \
            --create
          app-store-connect fetch-signing-files \
            com.sreeharshakelam.virtueforge.watchkitapp.ForgeWidget \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates

      - name: Set up profiles
        script: |
          xcode-project use-profiles
          xcode-project use-profiles --export-options-plist exportOptions.plist

      - name: Debug installed profiles
        script: |
          echo "=== Installed provisioning profiles ==="
          PROF_DIR=~/Library/MobileDevice/Provisioning\ Profiles
          ls "$PROF_DIR" 2>/dev/null || echo "No profiles directory"
          for f in "$PROF_DIR"/*.mobileprovision; do
            [ -f "$f" ] || continue
            name=$(security cms -D -i "$f" 2>/dev/null | /usr/libexec/PlistBuddy -c "Print :Name" /dev/stdin 2>/dev/null)
            app_id=$(security cms -D -i "$f" 2>/dev/null | /usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" /dev/stdin 2>/dev/null)
            echo "  $name | $app_id"
          done

      - name: Build and archive
        script: |
          xcodebuild \
            -project HabitForge.xcodeproj \
            -scheme HabitForge \
            -configuration Release \
            -archivePath HabitForge.xcarchive \
            GENERATE_INFOPLIST_FILE=NO \
            archive

      - name: Fix archive - compile assets and inject icons
        script: |
          APP="HabitForge.xcarchive/Products/Applications/HabitForge.app"
          PLIST="$APP/Info.plist"

          echo "=== Check if Assets.car has AppIcon ==="
          xcrun --sdk iphoneos assetutil --info "$APP/Assets.car" 2>/dev/null | head -30 || echo "No Assets.car or empty"

          echo ""
          echo "=== Manually compiling asset catalog ==="
          xcrun actool Assets.xcassets \
            --compile "$APP" \
            --platform iphoneos \
            --minimum-deployment-target 17.0 \
            --app-icon AppIcon \
            --output-partial-info-plist /tmp/assetcatalog_info.plist \
            2>&1

          echo ""
          echo "=== Partial Info.plist from actool ==="
          cat /tmp/assetcatalog_info.plist 2>/dev/null || echo "No partial plist generated"

          echo ""
          echo "=== Merge actool output into app Info.plist ==="
          # Add CFBundleIconName if missing
          /usr/libexec/PlistBuddy -c "Delete :CFBundleIconName" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleIconName string AppIcon" "$PLIST"

          # Merge partial plist keys
          if [ -f /tmp/assetcatalog_info.plist ]; then
            /usr/libexec/PlistBuddy -c "Merge /tmp/assetcatalog_info.plist" "$PLIST" 2>/dev/null || true
          fi

          echo ""
          echo "=== Verify Assets.car now ==="
          xcrun --sdk iphoneos assetutil --info "$APP/Assets.car" 2>/dev/null | grep -i "icon\|AppIcon\|name" | head -20

          echo ""
          echo "=== Icon files in bundle ==="
          find "$APP" -name "*Icon*" -o -name "*icon*" 2>/dev/null | head -20
          ls -la "$APP/Assets.car" 2>/dev/null

          echo ""
          echo "=== Final Info.plist ==="
          /usr/libexec/PlistBuddy -c "Print :CFBundleIconName" "$PLIST"
          /usr/libexec/PlistBuddy -c "Print :CFBundleIcons" "$PLIST" 2>/dev/null || echo "No CFBundleIcons"
          /usr/libexec/PlistBuddy -c "Print :CFBundlePrimaryIcon" "$PLIST" 2>/dev/null || echo "No CFBundlePrimaryIcon"

          echo ""
          echo "=== Fix watch app icons ==="
          WATCH_APP="$APP/Watch/HabitForgeWatch.app"
          WATCH_PLIST="$WATCH_APP/Info.plist"
          if [ -d "$WATCH_APP" ]; then
            xcrun actool HabitForgeWatch/Assets.xcassets \
              --compile "$WATCH_APP" \
              --platform watchos \
              --minimum-deployment-target 10.0 \
              --app-icon AppIcon \
              --output-partial-info-plist /tmp/watch_assetcatalog_info.plist \
              2>&1 || echo "actool watch (non-fatal)"
            /usr/libexec/PlistBuddy -c "Delete :CFBundleIconName" "$WATCH_PLIST" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :CFBundleIconName string AppIcon" "$WATCH_PLIST"
            if [ -f /tmp/watch_assetcatalog_info.plist ]; then
              /usr/libexec/PlistBuddy -c "Merge /tmp/watch_assetcatalog_info.plist" "$WATCH_PLIST" 2>/dev/null || true
            fi
            echo "Watch plist CFBundleIconName: $(/usr/libexec/PlistBuddy -c 'Print :CFBundleIconName' "$WATCH_PLIST" 2>/dev/null)"
            IDENTITY=$(security find-identity -v -p codesigning | grep "Apple Distribution" | head -1 | awk -F'"' '{print $2}')
            codesign -d --entitlements :- "$WATCH_APP" > /tmp/watch_ent.plist 2>/dev/null || true
            codesign --force --sign "$IDENTITY" --entitlements /tmp/watch_ent.plist "$WATCH_APP"
            echo "Watch app re-signed"
          else
            echo "Watch app not found at $WATCH_APP"
          fi

          echo ""
          echo "=== Re-signing main app ==="
          IDENTITY=$(security find-identity -v -p codesigning | grep "Apple Distribution" | head -1 | awk -F'"' '{print $2}')
          echo "Identity: $IDENTITY"
          codesign -d --entitlements :- "$APP" > /tmp/ent.plist 2>/dev/null || true
          codesign --force --sign "$IDENTITY" --entitlements /tmp/ent.plist "$APP"
          echo "Re-signed OK"

      - name: Export IPA
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath HabitForge.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath build/ipa

      - name: Upload to App Store Connect
        script: |
          cd build/ipa
          IPA_FILE=$(ls *.ipa | head -1)
          echo "Uploading $IPA_FILE..."
          xcrun altool --upload-app \
            -f "$IPA_FILE" \
            -t ios \
            --apiKey "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            2>&1 || {
            echo "altool failed, trying app-store-connect..."
            app-store-connect publish \
              --path "$IPA_FILE" \
              --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
              --issuer-id "$APP_STORE_CONNECT_ISSUER_ID"
          }

    artifacts:
      - build/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
