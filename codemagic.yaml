workflows:
  ios-workflow:
    name: FORGE iOS Build
    max_build_duration: 60
    environment:
      ios_signing:
        distribution_type: development
        bundle_identifier: com.sreeharshakelam.HabitForge
      xcode: latest
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate Xcode project
        script: |
          xcodegen generate --spec project.yml

      - name: Build IPA
        script: |
          xcodebuild \
            -project HabitForge.xcodeproj \
            -scheme HabitForge \
            -destination 'generic/platform=iOS' \
            -configuration Debug \
            -archivePath build/HabitForge.xcarchive \
            archive

          xcodebuild \
            -exportArchive \
            -archivePath build/HabitForge.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ExportOptions.plist

    artifacts:
      - build/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
