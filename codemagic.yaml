workflows:
  ios-workflow:
    name: FORGE iOS Build
    max_build_duration: 60
    environment:
      xcode: latest
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate Xcode project
        script: |
          xcodegen generate --spec project.yml

      - name: Build for Simulator
        script: |
          xcodebuild \
            -project HabitForge.xcodeproj \
            -scheme HabitForge \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build

          # Package the .app for Appetize
          cd build/Debug-iphonesimulator
          zip -r HabitForge.zip HabitForge.app

    artifacts:
      - build/Debug-iphonesimulator/HabitForge.zip
      - /tmp/xcodebuild_logs/*.log
