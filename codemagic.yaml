workflows:
  ios-appstore:
    name: FORGE App Store Release
    max_build_duration: 60
    environment:
      xcode: latest
      groups:
        - default
      vars:
        APP_STORE_CONNECT_ISSUER_ID: a6826daa-63d6-42be-bb34-2938edbcdb7d
        APP_STORE_CONNECT_KEY_IDENTIFIER: U2G5L4729F
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate Xcode project
        script: |
          xcodegen generate --spec project.yml

      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files \
            com.sreeharshakelam.HabitForge \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates

      - name: Set up profiles and generate export options
        script: |
          xcode-project use-profiles
          xcode-project use-profiles --export-options-plist exportOptions.plist

      - name: Build and archive
        script: |
          xcodebuild \
            -project HabitForge.xcodeproj \
            -scheme HabitForge \
            -configuration Release \
            -archivePath HabitForge.xcarchive \
            archive

      - name: Fix archive before export
        script: |
          APP="HabitForge.xcarchive/Products/Applications/HabitForge.app"
          PLIST="$APP/Info.plist"

          echo "=== BEFORE FIX ==="
          echo "Info.plist contents:"
          /usr/libexec/PlistBuddy -c "Print" "$PLIST"
          echo ""
          echo "Files in app bundle:"
          ls -la "$APP/"
          echo ""

          # 1. Force add CFBundleIconName
          /usr/libexec/PlistBuddy -c "Delete :CFBundleIconName" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleIconName string AppIcon" "$PLIST"

          # 2. Generate all required icon sizes from source
          echo "Generating icon files..."
          SOURCE_ICON="Assets.xcassets/AppIcon.appiconset/AppIcon.png"
          if [ ! -f "$SOURCE_ICON" ]; then
            echo "Source icon not found at $SOURCE_ICON, checking other locations..."
            SOURCE_ICON=$(find . -name "AppIcon.png" -path "*/AppIcon.appiconset/*" ! -path "./.git/*" | head -1)
            echo "Found: $SOURCE_ICON"
          fi

          # Use sips (built into macOS) to resize
          for size in 40 58 60 80 87 120 180 1024; do
            sips -z $size $size "$SOURCE_ICON" --out "$APP/AppIcon${size}x${size}.png" 2>/dev/null
            echo "  Created AppIcon${size}x${size}.png"
          done

          # 3. Add old-style CFBundleIcons to Info.plist as fallback
          /usr/libexec/PlistBuddy -c "Delete :CFBundleIcons" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons dict" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon dict" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconFiles array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconFiles: string AppIcon60x60" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconFiles: string AppIcon76x76" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconName string AppIcon" "$PLIST"

          # 4. Also copy with standard naming convention
          cp "$APP/AppIcon120x120.png" "$APP/AppIcon60x60@2x.png" 2>/dev/null || true
          cp "$APP/AppIcon180x180.png" "$APP/AppIcon60x60@3x.png" 2>/dev/null || true
          cp "$APP/AppIcon80x80.png" "$APP/AppIcon40x40@2x.png" 2>/dev/null || true
          cp "$APP/AppIcon120x120.png" "$APP/AppIcon40x40@3x.png" 2>/dev/null || true
          cp "$APP/AppIcon58x58.png" "$APP/AppIcon29x29@2x.png" 2>/dev/null || true
          cp "$APP/AppIcon87x87.png" "$APP/AppIcon29x29@3x.png" 2>/dev/null || true
          cp "$APP/AppIcon40x40.png" "$APP/AppIcon20x20@2x.png" 2>/dev/null || true
          cp "$APP/AppIcon60x60.png" "$APP/AppIcon20x20@3x.png" 2>/dev/null || true

          echo ""
          echo "=== AFTER FIX ==="
          echo "CFBundleIconName:"
          /usr/libexec/PlistBuddy -c "Print :CFBundleIconName" "$PLIST"
          echo "CFBundleIcons:"
          /usr/libexec/PlistBuddy -c "Print :CFBundleIcons" "$PLIST"
          echo ""
          echo "Icon files in bundle:"
          ls -la "$APP"/AppIcon* 2>/dev/null || echo "No icon files found"
          echo ""
          echo "Assets.car exists:"
          ls -la "$APP/Assets.car" 2>/dev/null || echo "No Assets.car"

          # 5. Re-codesign the modified app
          echo ""
          echo "=== Re-signing app ==="
          SIGNING_IDENTITY=$(security find-identity -v -p codesigning | grep "Apple Distribution" | head -1 | awk -F'"' '{print $2}')
          echo "Using identity: $SIGNING_IDENTITY"

          # Find the provisioning profile
          PROFILE=$(find "$HOME/Library/MobileDevice/Provisioning Profiles" -name "*.mobileprovision" | head -1)
          echo "Using profile: $PROFILE"
          if [ -n "$PROFILE" ]; then
            cp "$PROFILE" "$APP/embedded.mobileprovision"
          fi

          # Get entitlements from the existing signature
          codesign -d --entitlements :- "$APP" > /tmp/entitlements.plist 2>/dev/null || true

          # Re-sign
          codesign --force --sign "$SIGNING_IDENTITY" \
            --entitlements /tmp/entitlements.plist \
            "$APP"

          echo "Re-signed successfully"

      - name: Export IPA
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath HabitForge.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath build/ipa

      - name: Verify and fix IPA then upload
        script: |
          cd build/ipa
          IPA_FILE=$(ls *.ipa | head -1)
          echo "=== IPA: $IPA_FILE ==="

          # Unzip to inspect
          mkdir -p /tmp/ipa_check
          unzip -o "$IPA_FILE" -d /tmp/ipa_check
          APP_IN_IPA=$(find /tmp/ipa_check/Payload -name "*.app" -maxdepth 1 | head -1)

          echo "=== Info.plist in IPA ==="
          /usr/libexec/PlistBuddy -c "Print :CFBundleIconName" "$APP_IN_IPA/Info.plist" 2>&1
          /usr/libexec/PlistBuddy -c "Print :CFBundleIcons" "$APP_IN_IPA/Info.plist" 2>&1

          echo "=== Icon files in IPA ==="
          ls "$APP_IN_IPA"/AppIcon* 2>/dev/null || echo "No icon files"
          ls "$APP_IN_IPA"/Assets.car 2>/dev/null || echo "No Assets.car"

          echo ""
          echo "=== Uploading ==="
          xcrun altool --upload-app \
            -f "$IPA_FILE" \
            -t ios \
            --apiKey "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            2>&1 || {
            echo ""
            echo "altool failed, trying app-store-connect CLI..."
            app-store-connect publish \
              --path "$IPA_FILE" \
              --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
              --issuer-id "$APP_STORE_CONNECT_ISSUER_ID"
          }

    artifacts:
      - build/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
