workflows:
  ios-appstore:
    name: FORGE App Store Release
    max_build_duration: 60
    environment:
      xcode: latest
      groups:
        - default
      vars:
        APP_STORE_CONNECT_ISSUER_ID: a6826daa-63d6-42be-bb34-2938edbcdb7d
        APP_STORE_CONNECT_KEY_IDENTIFIER: U2G5L4729F
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate Xcode project
        script: |
          xcodegen generate --spec project.yml

      - name: Verify generated Info.plist has icon key
        script: |
          echo "=== Checking generated Info.plist ==="
          GENERATED_PLIST=$(find . -name "Info.plist" -path "*/HabitForge*" ! -path "./.git/*" | head -5)
          echo "Found plists: $GENERATED_PLIST"
          for f in $GENERATED_PLIST; do
            echo "--- $f ---"
            /usr/libexec/PlistBuddy -c "Print :CFBundleIconName" "$f" 2>&1 || echo "KEY MISSING in $f"
          done
          echo "=== Checking AppIcon asset ==="
          find . -path "*/AppIcon.appiconset/*" -type f
          echo "=== Build settings for icon ==="
          xcodebuild -project HabitForge.xcodeproj -scheme HabitForge -showBuildSettings 2>/dev/null | grep -i "icon\|INFOPLIST\|ASSETCATALOG" || true

      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files \
            com.sreeharshakelam.HabitForge \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates

      - name: Set up profiles and generate export options
        script: |
          xcode-project use-profiles
          xcode-project use-profiles --export-options-plist exportOptions.plist

      - name: Build and archive for App Store
        script: |
          xcodebuild \
            -project HabitForge.xcodeproj \
            -scheme HabitForge \
            -configuration Release \
            -archivePath HabitForge.xcarchive \
            archive

      - name: Verify archive Info.plist
        script: |
          APP_PLIST="HabitForge.xcarchive/Products/Applications/HabitForge.app/Info.plist"
          echo "=== Archive Info.plist contents ==="
          /usr/libexec/PlistBuddy -c "Print" "$APP_PLIST"
          echo ""
          echo "=== CFBundleIconName value ==="
          /usr/libexec/PlistBuddy -c "Print :CFBundleIconName" "$APP_PLIST" || echo "MISSING!"
          echo "=== App icon files in archive ==="
          find HabitForge.xcarchive -name "AppIcon*" -o -name "*.car" | head -20

      - name: Export IPA
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath HabitForge.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath build/ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true

    artifacts:
      - build/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
