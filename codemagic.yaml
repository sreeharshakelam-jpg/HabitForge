workflows:
  ios-appstore:
    name: FORGE App Store Release
    max_build_duration: 60
    environment:
      xcode: latest
      groups:
        - default
      vars:
        APP_STORE_CONNECT_ISSUER_ID: a6826daa-63d6-42be-bb34-2938edbcdb7d
        APP_STORE_CONNECT_KEY_IDENTIFIER: U2G5L4729F
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate Xcode project
        script: |
          xcodegen generate --spec project.yml

      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files \
            com.sreeharshakelam.HabitForge \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates

      - name: Set up profiles and generate export options
        script: |
          xcode-project use-profiles
          xcode-project use-profiles --export-options-plist exportOptions.plist

      - name: Build and archive for App Store
        script: |
          xcodebuild \
            -project HabitForge.xcodeproj \
            -scheme HabitForge \
            -configuration Release \
            -archivePath HabitForge.xcarchive \
            archive

      - name: Fix Info.plist in archive
        script: |
          APP_PLIST="HabitForge.xcarchive/Products/Applications/HabitForge.app/Info.plist"
          /usr/libexec/PlistBuddy -c "Delete :CFBundleIconName" "$APP_PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleIconName string AppIcon" "$APP_PLIST"
          echo "CFBundleIconName added to Info.plist"
          /usr/libexec/PlistBuddy -c "Print :CFBundleIconName" "$APP_PLIST"

      - name: Export IPA
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath HabitForge.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath build/ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true

    artifacts:
      - build/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
