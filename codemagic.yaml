workflows:
  ios-appstore:
    name: FORGE App Store Release
    max_build_duration: 60
    environment:
      xcode: latest
      groups:
        - default
      vars:
        APP_STORE_CONNECT_ISSUER_ID: a6826daa-63d6-42be-bb34-2938edbcdb7d
        APP_STORE_CONNECT_KEY_IDENTIFIER: U2G5L4729F
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Sync all Assets and Info.plist
        script: |
          echo "=== Ensuring HabitForge/HabitForge/ matches top-level ==="
          # Copy icon to ALL AppIcon.appiconset locations
          find . -path "*/AppIcon.appiconset" ! -path "./.git/*" -type d | while read d; do
            echo "Syncing $d"
            cp Assets.xcassets/AppIcon.appiconset/AppIcon.png "$d/AppIcon.png" 2>/dev/null || true
            cat > "$d/Contents.json" << 'ICONJSON'
          {
            "images" : [
              {
                "filename" : "AppIcon.png",
                "idiom" : "universal",
                "platform" : "ios",
                "size" : "1024x1024"
              }
            ],
            "info" : {
              "author" : "xcode",
              "version" : 1
            }
          }
          ICONJSON
            echo "  Contents:"
            ls -la "$d"
          done

          # Ensure CFBundleIconName in ALL Info.plist files
          find . -name "Info.plist" ! -path "./.git/*" | while read f; do
            /usr/libexec/PlistBuddy -c "Delete :CFBundleIconName" "$f" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :CFBundleIconName string AppIcon" "$f"
            echo "Fixed $f"
          done

      - name: Generate Xcode project
        script: |
          xcodegen generate --spec project.yml

      - name: Debug project structure
        script: |
          echo "=== What INFOPLIST_FILE does xcodebuild use? ==="
          xcodebuild -project HabitForge.xcodeproj -scheme HabitForge -showBuildSettings 2>/dev/null | grep -E "INFOPLIST_FILE|GENERATE_INFOPLIST|ASSETCATALOG|TARGETED_DEVICE" || true
          echo ""
          echo "=== What sources does the project reference? ==="
          grep -r "Assets.xcassets" HabitForge.xcodeproj/project.pbxproj | head -10 || true
          echo ""
          echo "=== Verify Info.plist that Xcode will use ==="
          PLIST_FILE=$(xcodebuild -project HabitForge.xcodeproj -scheme HabitForge -showBuildSettings 2>/dev/null | grep "INFOPLIST_FILE" | head -1 | awk '{print $NF}')
          echo "INFOPLIST_FILE = $PLIST_FILE"
          if [ -f "$PLIST_FILE" ]; then
            echo "Contents:"
            /usr/libexec/PlistBuddy -c "Print" "$PLIST_FILE"
          else
            echo "File not found! Checking relative to project..."
            find . -name "$(basename $PLIST_FILE)" ! -path "./.git/*" | while read f; do
              echo "Found at: $f"
              /usr/libexec/PlistBuddy -c "Print :CFBundleIconName" "$f" 2>&1
            done
          fi

      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files \
            com.sreeharshakelam.HabitForge \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates

      - name: Set up profiles and generate export options
        script: |
          xcode-project use-profiles
          xcode-project use-profiles --export-options-plist exportOptions.plist

      - name: Build and archive
        script: |
          xcodebuild \
            -project HabitForge.xcodeproj \
            -scheme HabitForge \
            -configuration Release \
            -archivePath HabitForge.xcarchive \
            ASSETCATALOG_COMPILER_APPICON_NAME=AppIcon \
            GENERATE_INFOPLIST_FILE=NO \
            archive 2>&1 | tail -50

      - name: Full archive inspection
        script: |
          APP="HabitForge.xcarchive/Products/Applications/HabitForge.app"

          echo "=== All files in app bundle ==="
          ls -la "$APP/"

          echo ""
          echo "=== Info.plist ==="
          /usr/libexec/PlistBuddy -c "Print" "$APP/Info.plist"

          echo ""
          echo "=== Assets.car contents (actool) ==="
          xcrun --sdk iphoneos assetutil --info "$APP/Assets.car" 2>/dev/null | grep -i "icon\|AppIcon\|name" | head -20 || echo "Could not inspect Assets.car"

          echo ""
          echo "=== Icon files ==="
          find "$APP" -name "*Icon*" -o -name "*icon*" | head -20

      - name: Export IPA
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath HabitForge.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath build/ipa

      - name: Upload to App Store Connect
        script: |
          cd build/ipa
          IPA_FILE=$(ls *.ipa | head -1)
          echo "Uploading $IPA_FILE..."
          xcrun altool --upload-app \
            -f "$IPA_FILE" \
            -t ios \
            --apiKey "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            2>&1 || {
            echo "altool failed, trying app-store-connect..."
            app-store-connect publish \
              --path "$IPA_FILE" \
              --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
              --issuer-id "$APP_STORE_CONNECT_ISSUER_ID"
          }

    artifacts:
      - build/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
