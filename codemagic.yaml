workflows:
  ios-appstore:
    name: FORGE App Store Release
    max_build_duration: 60
    environment:
      xcode: latest
      groups:
        - default
      vars:
        APP_STORE_CONNECT_ISSUER_ID: a6826daa-63d6-42be-bb34-2938edbcdb7d
        APP_STORE_CONNECT_KEY_IDENTIFIER: U2G5L4729F
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate Xcode project
        script: |
          xcodegen generate --spec project.yml

      - name: Force CFBundleIconName into Info.plist
        script: |
          /usr/libexec/PlistBuddy -c "Delete :CFBundleIconName" Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleIconName string AppIcon" Info.plist
          echo "Verified CFBundleIconName:"
          /usr/libexec/PlistBuddy -c "Print :CFBundleIconName" Info.plist

      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files \
            com.sreeharshakelam.HabitForge \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates

      - name: Set up profiles and generate export options
        script: |
          xcode-project use-profiles
          xcode-project use-profiles --export-options-plist exportOptions.plist

      - name: Build and archive for App Store
        script: |
          xcodebuild \
            -project HabitForge.xcodeproj \
            -scheme HabitForge \
            -configuration Release \
            -archivePath HabitForge.xcarchive \
            archive

      - name: Export IPA
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath HabitForge.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath build/ipa

      - name: Upload to App Store Connect
        script: |
          cd build/ipa
          IPA_FILE=$(ls *.ipa | head -1)
          echo "Uploading $IPA_FILE..."
          app-store-connect publish \
            --path "$IPA_FILE" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID"

    artifacts:
      - build/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
