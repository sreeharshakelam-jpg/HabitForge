workflows:
  ios-appstore:
    name: FORGE App Store Release
    max_build_duration: 60
    environment:
      xcode: latest
      groups:
        - default
      vars:
        APP_STORE_CONNECT_ISSUER_ID: a6826daa-63d6-42be-bb34-2938edbcdb7d
        APP_STORE_CONNECT_KEY_IDENTIFIER: U2G5L4729F
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate Xcode project
        script: |
          xcodegen generate --spec project.yml

      - name: Force CFBundleIconName into Info.plist
        script: |
          /usr/libexec/PlistBuddy -c "Delete :CFBundleIconName" Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleIconName string AppIcon" Info.plist
          echo "Info.plist after fix:"
          /usr/libexec/PlistBuddy -c "Print" Info.plist

      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files \
            com.sreeharshakelam.HabitForge \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates

      - name: Set up profiles and generate export options
        script: |
          xcode-project use-profiles
          xcode-project use-profiles --export-options-plist exportOptions.plist

      - name: Build and archive for App Store
        script: |
          xcodebuild \
            -project HabitForge.xcodeproj \
            -scheme HabitForge \
            -configuration Release \
            -archivePath HabitForge.xcarchive \
            GENERATE_INFOPLIST_FILE=NO \
            archive

      - name: Export IPA
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath HabitForge.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath build/ipa

      - name: Inspect and fix IPA then upload
        script: |
          cd build/ipa
          IPA_FILE=$(ls *.ipa | head -1)
          echo "=== IPA file: $IPA_FILE ==="

          # Unzip IPA to inspect
          mkdir -p /tmp/ipa_inspect
          unzip -o "$IPA_FILE" -d /tmp/ipa_inspect

          # Find the app inside
          APP_PATH=$(find /tmp/ipa_inspect/Payload -name "*.app" -maxdepth 1 | head -1)
          echo "=== App path: $APP_PATH ==="

          # Show current Info.plist
          echo "=== Info.plist INSIDE IPA ==="
          /usr/libexec/PlistBuddy -c "Print" "$APP_PATH/Info.plist"

          echo ""
          echo "=== CFBundleIconName check ==="
          /usr/libexec/PlistBuddy -c "Print :CFBundleIconName" "$APP_PATH/Info.plist" 2>&1 || {
            echo "!!! CFBundleIconName MISSING - adding it now !!!"
            /usr/libexec/PlistBuddy -c "Add :CFBundleIconName string AppIcon" "$APP_PATH/Info.plist"
            echo "Added. Rebuilding IPA..."

            # Remove old IPA and repackage
            rm "$IPA_FILE"
            cd /tmp/ipa_inspect
            zip -r "/Users/builder/clone/build/ipa/$IPA_FILE" Payload/
            cd /Users/builder/clone/build/ipa
            echo "IPA rebuilt with CFBundleIconName"
          }

          echo ""
          echo "=== Uploading to App Store Connect ==="
          app-store-connect publish \
            --path "$IPA_FILE" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID"

    artifacts:
      - build/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
