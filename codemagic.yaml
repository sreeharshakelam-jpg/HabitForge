workflows:
  ios-appstore:
    name: FORGE App Store Release
    max_build_duration: 60
    environment:
      xcode: latest
      groups:
        - default
      vars:
        APP_STORE_CONNECT_ISSUER_ID: a6826daa-63d6-42be-bb34-2938edbcdb7d
        APP_STORE_CONNECT_KEY_IDENTIFIER: U2G5L4729F
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate Xcode project
        script: |
          xcodegen generate --spec project.yml

      - name: Ensure CFBundleIconName in ALL Info.plist files
        script: |
          echo "=== Finding all Info.plist files ==="
          find . -name "Info.plist" ! -path "./.git/*" | while read f; do
            echo "Checking $f..."
            if ! /usr/libexec/PlistBuddy -c "Print :CFBundleIconName" "$f" 2>/dev/null; then
              echo "  MISSING - adding CFBundleIconName"
              /usr/libexec/PlistBuddy -c "Add :CFBundleIconName string AppIcon" "$f"
            else
              echo "  OK"
            fi
          done
          echo ""
          echo "=== Finding all AppIcon assets ==="
          find . -path "*/AppIcon.appiconset/*" ! -path "./.git/*" -type f
          echo ""
          echo "=== Ensuring all AppIcon.appiconset have the icon file ==="
          find . -path "*/AppIcon.appiconset" ! -path "./.git/*" -type d | while read d; do
            if [ ! -f "$d/AppIcon.png" ]; then
              echo "MISSING AppIcon.png in $d - copying..."
              cp Assets.xcassets/AppIcon.appiconset/AppIcon.png "$d/AppIcon.png"
              cat > "$d/Contents.json" << 'ICONEOF'
          {
            "images" : [
              {
                "filename" : "AppIcon.png",
                "idiom" : "universal",
                "platform" : "ios",
                "size" : "1024x1024"
              }
            ],
            "info" : {
              "author" : "xcode",
              "version" : 1
            }
          }
          ICONEOF
            fi
            echo "Contents of $d:"
            ls -la "$d"
          done
          echo ""
          echo "=== Build settings ==="
          xcodebuild -project HabitForge.xcodeproj -scheme HabitForge -showBuildSettings 2>/dev/null | grep -E "INFOPLIST_FILE|GENERATE_INFOPLIST|ASSETCATALOG_COMPILER_APPICON" || true

      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files \
            com.sreeharshakelam.HabitForge \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates

      - name: Set up profiles and generate export options
        script: |
          xcode-project use-profiles
          xcode-project use-profiles --export-options-plist exportOptions.plist

      - name: Build and archive
        script: |
          xcodebuild \
            -project HabitForge.xcodeproj \
            -scheme HabitForge \
            -configuration Release \
            -archivePath HabitForge.xcarchive \
            GENERATE_INFOPLIST_FILE=NO \
            archive

      - name: Verify archive
        script: |
          PLIST="HabitForge.xcarchive/Products/Applications/HabitForge.app/Info.plist"
          echo "=== CFBundleIconName in archive ==="
          /usr/libexec/PlistBuddy -c "Print :CFBundleIconName" "$PLIST" 2>&1
          echo "=== Assets in archive ==="
          find HabitForge.xcarchive/Products/Applications/HabitForge.app -maxdepth 1 -name "*.car" -o -name "AppIcon*" | head -10

      - name: Export IPA
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath HabitForge.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath build/ipa

      - name: Upload to App Store Connect
        script: |
          cd build/ipa
          IPA_FILE=$(ls *.ipa | head -1)
          echo "Uploading $IPA_FILE..."
          app-store-connect publish \
            --path "$IPA_FILE" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID"

    artifacts:
      - build/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
