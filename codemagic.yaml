workflows:
  ios-appstore:
    name: FORGE App Store Release
    max_build_duration: 60
    environment:
      xcode: latest
      groups:
        - default
      vars:
        APP_STORE_CONNECT_ISSUER_ID: a6826daa-63d6-42be-bb34-2938edbcdb7d
        APP_STORE_CONNECT_KEY_IDENTIFIER: U2G5L4729F
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate Xcode project
        script: |
          xcodegen generate --spec project.yml

      - name: Force CFBundleIconName into Info.plist
        script: |
          echo "=== Force-adding CFBundleIconName to Info.plist ==="
          /usr/libexec/PlistBuddy -c "Delete :CFBundleIconName" Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleIconName string AppIcon" Info.plist
          /usr/libexec/PlistBuddy -c "Print :CFBundleIconName" Info.plist
          echo "=== Full Info.plist ==="
          cat Info.plist
          echo ""
          echo "=== Build settings check ==="
          xcodebuild -project HabitForge.xcodeproj -scheme HabitForge -showBuildSettings 2>/dev/null | grep -E "INFOPLIST_FILE|GENERATE_INFOPLIST|INFOPLIST_KEY|ASSETCATALOG_COMPILER_APPICON" || true
          echo "=== AppIcon assets ==="
          find . -path "*/AppIcon.appiconset/*" -type f

      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files \
            com.sreeharshakelam.HabitForge \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates

      - name: Set up profiles and generate export options
        script: |
          xcode-project use-profiles
          xcode-project use-profiles --export-options-plist exportOptions.plist

      - name: Build and archive for App Store
        script: |
          xcodebuild \
            -project HabitForge.xcodeproj \
            -scheme HabitForge \
            -configuration Release \
            -archivePath HabitForge.xcarchive \
            GENERATE_INFOPLIST_FILE=NO \
            INFOPLIST_KEY_CFBundleIconName=AppIcon \
            archive

      - name: Verify and fix archive plist
        script: |
          APP_PLIST="HabitForge.xcarchive/Products/Applications/HabitForge.app/Info.plist"
          echo "=== Archive Info.plist ==="
          /usr/libexec/PlistBuddy -c "Print" "$APP_PLIST"
          echo ""
          echo "=== CFBundleIconName ==="
          /usr/libexec/PlistBuddy -c "Print :CFBundleIconName" "$APP_PLIST" 2>&1 || {
            echo "KEY MISSING - injecting now"
            /usr/libexec/PlistBuddy -c "Add :CFBundleIconName string AppIcon" "$APP_PLIST"
            echo "Injected. Re-signing app..."
            codesign --force --sign "$(security find-identity -v -p codesigning | head -1 | awk -F'"' '{print $2}')" \
              --entitlements HabitForge.entitlements \
              "HabitForge.xcarchive/Products/Applications/HabitForge.app"
            echo "Re-signed successfully"
          }
          echo "=== Compiled assets ==="
          find HabitForge.xcarchive -name "Assets.car" -o -name "AppIcon*" | head -10

      - name: Export IPA
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath HabitForge.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath build/ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true

    artifacts:
      - build/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
